{% load allauth %}
<section class="card">
    <h2 class="text-lg font-bold text-stone-900">
        {% slot title %}
        {% endslot %}
    </h2>
    <div class="mt-2 text-sm text-stone-600">
        {% slot body %}
        {% endslot %}
    </div>
    {% if slots.actions %}
        <ul class="mt-4 flex flex-wrap gap-2">
            {% for action in slots.actions %}<li>{{ action }}</li>{% endfor %}
        </ul>
    {% endif %}
</section>
