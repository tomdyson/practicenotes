name: CI

on:
  push:
  pull_request:
    types: [opened, reopened]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --locked
      - name: Lint
        run: uv run ruff check .
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Test
        run: uv run pytest

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --locked
      - name: Install Chromium
        run: uv run playwright install --with-deps chromium
      - name: Build CSS
        run: uv run python manage.py tailwind build
      - name: End-to-end tests
        run: uv run pytest -m e2e
        env:
          DJANGO_ALLOW_ASYNC_UNSAFE: "1"

  deploy:
    # Deploys on main when the FLY_API_TOKEN repo secret is set; otherwise
    # the job is a no-op so CI stays green before first launch.
    needs: [lint-test, e2e]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: deploy-group
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Check for deploy token
        id: token
        run: echo "have=$([ -n "$FLY_API_TOKEN" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        if: steps.token.outputs.have == 'true'
      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.token.outputs.have == 'true'
      - name: Deploy
        if: steps.token.outputs.have == 'true'
        run: flyctl deploy --remote-only
